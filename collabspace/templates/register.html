<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- character encoding for proper text display -->
    <meta charset="UTF-8" />

    <!-- page title shown in browser tab -->
    <title>Create Account | Collab Space</title>

    <!-- linking external stylesheet -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css') }}"
    />

    <!-- internal styles for flash messages -->
    <style>
      /* base style for all flash messages */
      .flash-msg {
        padding: 15px;
        margin: 20px;
        border-radius: 8px;
        text-align: center;
        font-weight: bold;
      }

      /* error message styling */
      .flash-error {
        background: #ff4444;
        color: white;
      }

      /* success message styling */
      .flash-success {
        background: #44dd44;
        color: white;
      }
    </style>
  </head>

  <!-- ========================= BODY SECTION ========================= -->
  <body>
    <!-- main split layout container (left + right) -->
    <div class="split-container">
      <!-- left side login/register card area -->
      <div class="left-side">
        <!-- glass style card container -->
        <div class="glass-card">
          <!-- logo image -->
          <img
            src="{{ url_for('static', filename='logo.png') }}"
            class="logo"
          />

          <!-- page heading -->
          <h2>Create Account</h2>

          <!-- subtitle text -->
          <p class="sub">Start your journey</p>

          <!-- ================= FLASH MESSAGES FROM BACKEND ================= -->
          {% with messages = get_flashed_messages(with_categories=True) %} {% if
          messages %} {% for category, message in messages %}

          <!-- display success or error messages dynamically -->
          <div
            class="flash-msg flash-{{ 'success' if category == 'success' else 'error' }}"
          >
            {{ message }}
          </div>

          {% endfor %} {% endif %} {% endwith %}

          <!-- ================= REGISTER FORM ================= -->
          <form method="POST" action="{{ url_for('register') }}">
            <!-- full name input -->
            <input
              type="text"
              name="fullname"
              placeholder="Full Name"
              required
            />

            <!-- email input -->
            <input type="email" name="email" placeholder="Email" required />

            <!-- password input -->
            <input
              type="password"
              name="password"
              placeholder="Password"
              required
            />

            <!-- submit button -->
            <button type="submit">Create</button>
          </form>

          <!-- link to login page -->
          <p class="link-text">
            Already have one?
            <a href="{{ url_for('login') }}">Login</a>
          </p>
        </div>
      </div>

      <!-- right side branding section -->
      <div class="right-side big-text">
        <!-- main heading -->
        <h1>Join Collab Space</h1>

        <!-- tagline -->
        <p>Create. Share. Collaborate.</p>
      </div>
    </div>
  </body>
</html>
