{% extends "layout.html" %}

<!-- page title for browser tab -->
{% block title %}New Post{% endblock %} {% block head %}
<style>
  /* centers the form on the page */
  .main {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding-top: 140px;
  }

  /* main form container card */
  .form-container {
    max-width: 550px;
    width: 100%;
    background: rgba(20, 20, 30, 0.95);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 40px;
    margin: 20px;
  }

  /* form title styling */
  .form-title {
    text-align: center;
    color: white;
    font-size: 32px;
    margin-bottom: 35px;
    font-weight: 600;
  }

  /* spacing between input sections */
  .input-group {
    margin-bottom: 28px;
  }

  /* labels for inputs */
  .input-label {
    display: block;
    color: #e0e0e0;
    margin-bottom: 10px;
    font-weight: 500;
  }

  /* text inputs and textarea styling */
  .input-field,
  textarea {
    width: 100%;
    padding: 16px 20px;
    background: rgba(50, 50, 65, 0.8);
    border: 2px solid rgba(80, 80, 100, 0.5);
    border-radius: 12px;
    color: white;
    font-size: 16px;
    transition: 0.2s;
    box-sizing: border-box;
  }

  /* focus effect for inputs */
  .input-field:focus,
  textarea:focus {
    outline: none;
    border-color: #0095dd;
    background: rgba(60, 60, 75, 0.9);
    box-shadow: 0 0 0 4px rgba(0, 149, 221, 0.1);
  }

  /* file upload box styling */
  .file-upload {
    position: relative;
    display: flex;
    align-items: center;
    padding: 20px;
    background: rgba(50, 50, 65, 0.8);
    border: 2px dashed rgba(80, 80, 100, 0.5);
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  /* hover effect for file upload */
  .file-upload:hover {
    border-color: #0095dd;
    background: rgba(60, 60, 75, 0.9);
  }

  /* hidden file input (clickable via upload box) */
  .file-upload input {
    position: absolute;
    opacity: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
  }

  /* file info text */
  .file-info {
    flex: 1;
    color: #ccc;
  }

  /* image preview styling */
  .file-preview {
    max-width: 120px;
    max-height: 80px;
    border-radius: 8px;
    margin-left: 15px;
    display: none;
  }

  /* button container */
  .button-group {
    display: flex;
    gap: 20px;
    margin-top: 35px;
  }

  /* base button styling */
  .btn {
    flex: 1;
    padding: 18px 30px;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* cancel button */
  .btn-secondary {
    background: rgba(80, 80, 100, 0.6);
    color: #e0e0e0;
  }

  /* hover for cancel button */
  .btn-secondary:hover {
    background: rgba(100, 100, 120, 0.8);
  }

  /* submit button */
  .btn-primary {
    background: linear-gradient(135deg, #0095dd, #007bb5);
    color: white;
  }

  /* hover animation for submit button */
  .btn-primary:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(0, 149, 221, 0.4);
  }

  /* responsive design for mobile */
  @media (max-width: 768px) {
    .form-container {
      margin: 15px;
      padding: 30px 25px;
    }

    .form-title {
      font-size: 28px;
    }

    .button-group {
      flex-direction: column;
    }

    .btn {
      padding: 16px;
    }
  }
</style>
{% endblock %} {% block body %}

<!-- main form container -->
<div class="form-container">
  <!-- page heading -->
  <h1 class="form-title">Create New Post</h1>

  <!-- form for creating a new post -->
  <form method="POST" enctype="multipart/form-data">
    <!-- ================= TITLE INPUT ================= -->
    <div class="input-group">
      <label class="input-label">Post Title</label>
      <input
        type="text"
        class="input-field"
        name="title"
        placeholder="e.g. Need help with CSS layout"
        required
      />
    </div>

    <!-- description input section -->
    <div class="input-group">
      <label class="input-label">Description</label>
      <textarea
        class="input-field"
        name="description"
        rows="6"
        placeholder="What do you need help with? Include details about your project, skills needed, deadline etc."
      ></textarea>
    </div>

    <!-- ================= IMAGE UPLOAD ================= -->
    <div class="input-group">
      <label class="input-label">Project Image (optional)</label>

      <!-- file upload container -->
      <div class="file-upload">
        <!-- hidden file input -->
        <input type="file" name="image" id="image-upload" accept="image/*" />

        <!-- file upload info text -->
        <div class="file-info">
          <div style="font-weight: 500; margin-bottom: 5px">
            Click to choose image
          </div>
          <div style="font-size: 14px; opacity: 0.8">JPG or PNG (max 5MB)</div>
        </div>

        <!-- image preview -->
        <img class="file-preview" id="preview-img" alt="preview" />
      </div>
    </div>

    <!-- hidden field defining post type -->
    <input type="hidden" name="post_type" value="need_help" />

    <!-- ================= BUTTONS ================= -->
    <div class="button-group">
      <!-- cancel button -->
      <button type="button" class="btn btn-secondary" onclick="history.back()">
        Cancel
      </button>

      <!-- submit post button -->
      <button type="submit" class="btn btn-primary">Post</button>
    </div>
  </form>
</div>

<!-- ================= FILE PREVIEW SCRIPT ================= -->
<script>
  const fileUpload = document.getElementById("image-upload");
  const fileInfo = document.querySelector(".file-info");
  const previewImg = document.getElementById("preview-img");
  let selectedFile = null;

  // runs when user selects an image
  fileUpload.addEventListener("change", function (e) {
    selectedFile = e.target.files[0];

    if (selectedFile) {
      const reader = new FileReader();

      reader.onload = function (e) {
        // show image preview
        previewImg.src = e.target.result;
        previewImg.style.display = "block";
      };

      reader.readAsDataURL(selectedFile);

      // update file info text
      fileInfo.innerHTML = `
        <div style="font-weight: 500;">${selectedFile.name}</div>
        <div style="font-size: 14px; opacity: 0.8;">
          ${Math.round(selectedFile.size / 1024)}KB
        </div>
      `;
    }
  });
</script>

{% endblock %}
