{% extends "layout.html" %}

<!-- page title shown in browser tab -->
{% block title %}Edit Profile{% endblock %} {% block head %}
<style>
  /* wrapper to center the edit profile box */
  .edit-wrap {
    max-width: 500px;
    margin: 0 auto;
    padding: 20px;
  }

  /* main card container for the form */
  .edit-card {
    background: #222;
    border: 1px solid #444;
    border-radius: 12px;
    padding: 30px;
  }

  /* title inside edit card */
  .edit-card h2 {
    color: #fff;
    margin-bottom: 20px;
    text-align: center;
  }

  /* spacing for each form section */
  .form-group {
    margin-bottom: 20px;
  }

  /* label styling for inputs */
  .form-group label {
    display: block;
    color: #ccc;
    margin-bottom: 8px;
    font-size: 14px;
  }

  /* input and textarea styling */
  .form-group input,
  .form-group textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid #555;
    border-radius: 8px;
    background: #333;
    color: #fff;
    font-size: 14px;
  }

  /* focus effect when user clicks input */
  .form-group input:focus,
  .form-group textarea:focus {
    outline: none;
    border-color: #0095dd;
  }

  /* textarea specific settings */
  .form-group textarea {
    resize: vertical;
    min-height: 100px;
  }

  /* save button styling */
  .save-btn {
    background: #0095dd;
    color: white;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    width: 100%;
    margin-bottom: 10px;
  }

  /* hover effect for save button */
  .save-btn:hover {
    background: #007bb8;
  }

  /* cancel button styling (acts like a link) */
  .cancel-btn {
    background: #444;
    color: white;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    width: 100%;
    text-decoration: none;
    display: inline-block;
    text-align: center;
  }

  /* hover effect for cancel button */
  .cancel-btn:hover {
    background: #555;
  }

  /* profile image preview styling */
  .current-pic {
    width: 100px;
    height: 100px;
    border-radius: 50%; /* makes it circle */
    object-fit: cover;
    border: 3px solid #0095dd;
    display: block;
    margin: 0 auto 15px;
  }
</style>
{% endblock %} {% block body %}

<!-- main container for edit profile page -->
<div class="edit-wrap">
  <div class="edit-card">
    <!-- page heading -->
    <h2>Edit Profile</h2>

    <!-- form sends updated profile data -->
    <form method="POST" action="/profile/edit">
      <!-- full name input -->
      <div class="form-group">
        <label for="full_name">Full Name</label>
        <input
          type="text"
          id="full_name"
          name="full_name"
          value="{{ user.full_name or '' }}"
          required
        />
      </div>

      <!-- bio input -->
      <div class="form-group">
        <label for="bio">Bio</label>
        <textarea id="bio" name="bio" placeholder="Tell us about yourself...">
{{ user.bio or '' }}</textarea
        >
      </div>

      <!-- skills input -->
      <div class="form-group">
        <label for="skills">Skills</label>
        <input
          type="text"
          id="skills"
          name="skills"
          value="{{ skills_str or '' }}"
          placeholder="e.g. Python, Design, Writing"
        />
        <!-- helper text -->
        <small style="color: #888; display: block; margin-top: 6px">
          Separate skills with commas
        </small>
      </div>

      <!-- submit button -->
      <button type="submit" class="save-btn">Save Changes</button>

      <!-- cancel and go back -->
      <a href="/profile" class="cancel-btn">Cancel</a>
    </form>
  </div>
</div>

{% endblock %}
